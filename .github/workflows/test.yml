# Terraform Provider testing workflow.
name: Tests

# This GitHub action runs your tests for each pull request and push.
# Optionally, you can turn it on using a schedule for regular testing.
on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    paths-ignore:
      - 'README.md'

# Testing only needs permissions to read the repository contents.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Ensure project builds before running testing matrix
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go build -v .
      - name: Run linters
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  generate:
    name: Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      # We need the latest version of Terraform for our documentation generation to use
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - run: make generate
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'make generate' command and commit."; exit 1)

  test:
    name: Provider Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        include:
          - engine: terraform
            version: '1.14.*'
          - engine: terraform
            version: '1.15.*'
          - engine: opentofu
            version: '1.11.*'
          - engine: opentofu
            version: '1.12.*'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Setup Terraform
        if: matrix.engine == 'terraform'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ matrix.version }}
          terraform_wrapper: false
      - name: Setup OpenTofu
        if: matrix.engine == 'opentofu'
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: ${{ matrix.version }}
          tofu_wrapper: false
      - run: go mod download
      - name: Run unit tests
        run: go test -v -cover ./internal/provider/

  acceptance:
    name: Provider Acceptance Tests
    if: github.ref == 'refs/heads/main'
    needs: ['build', 'test']
    runs-on: ubuntu-latest
    environment: acctest
    timeout-minutes: 15
    strategy:
      max-parallel: 1 # avoid rate limiting issues
      fail-fast: false
      matrix:
        include:
          - engine: terraform
            version: '1.14.*'
          - engine: terraform
            version: '1.15.*'
          - engine: opentofu
            version: '1.11.*'
          - engine: opentofu
            version: '1.12.*'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Setup Terraform
        if: matrix.engine == 'terraform'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ matrix.version }}
          terraform_wrapper: false
      - name: Setup OpenTofu
        if: matrix.engine == 'opentofu'
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: ${{ matrix.version }}
          tofu_wrapper: false
      - run: go mod download
      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          ENGINE: ${{ matrix.engine }}
          PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
          PORKBUN_SECRET_API_KEY: ${{ secrets.PORKBUN_SECRET_API_KEY }}
          PORKBUN_ACCTEST_DOMAIN: ${{ secrets.PORKBUN_ACCTEST_DOMAIN }}
        run: |
          if [[ "${ENGINE}" == "opentofu" ]]; then
            export TF_ACC_TERRAFORM_PATH="$(command -v tofu)"
            export TF_ACC_PROVIDER_NAMESPACE="hashicorp"
            export TF_ACC_PROVIDER_HOST="registry.opentofu.org"
          fi
          go test -v -cover ./internal/provider/
        timeout-minutes: 10
