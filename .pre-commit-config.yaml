repos:
  - repo: local
    hooks:
      - id: go-test
        name: go test
        entry: go test -v ./...
        pass_filenames: false
        language: system
      - id: generate-docs
        name: Generate Docs
        entry: cd docs && go generate ./...
        pass_filenames: false
        language: system
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      - id: golangci-lint
      - id: golangci-lint-fmt
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
